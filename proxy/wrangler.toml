# judal 실데이터 프록시 — Cloudflare Workers 배포 설정
#
# 배포(별도 Cloudflare 계정 + Workers 전용 토큰 사용):
#   1) npm i -g wrangler
#   2) wrangler login            # 또는 CLOUDFLARE_API_TOKEN 환경변수
#   3) wrangler secret put JODAL_API_KEY     # data.go.kr 서비스키 입력
#   4) wrangler deploy
#
# 배포 후 출력되는 https://judal-proxy.<계정>.workers.dev 주소를
# 프론트 config.js 의 PROXY_URL 에 넣으면 끝.

name = "judal-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# (메일 알리미 Cron 제거됨 — 필요 시 아래 주석 해제)
# [triggers]
# crons = ["0 0 * * *", "0 10 * * *"]

# 공개 Pages 사이트만 이 프록시를 부르도록 제한 (CORS)
[vars]
ALLOWED_ORIGIN = "https://elsa9598.github.io"
ALERT_EMAIL = "3dleader0128@gmail.com"

# secret (평문 금지):
#   wrangler secret put JODAL_API_KEY     # data.go.kr 서비스키
#   wrangler secret put RESEND_API_KEY    # 메일 발송(알리미)
